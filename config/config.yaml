# Application configuration

schedule:
  ats: "0 */6 * * *"      # Every 6 hours
  rss: "0 0 * * *"        # Daily at midnight
  cleanup: "0 0 * * 0"    # Weekly on Sunday

notifications:
  telegram:
    enabled: true
    # Set these via environment variables:
    # TELEGRAM_BOT_TOKEN
    # TELEGRAM_CHAT_ID

storage:
  dbPath: "./data/jobs.db"
  retentionDays: 90
