# Application configuration

schedule:
  ats: "0 */6 * * *"      # Every 6 hours
  rss: "0 */6 * * *"      # Every 6 hours
  cleanup: "0 0 * * 0"    # Weekly on Sunday

notifications:
  telegram:
    enabled: true
    # Set these via environment variables:
    # TELEGRAM_BOT_TOKEN
    # TELEGRAM_CHAT_ID

storage:
  dbPath: "./data/jobs.db"
  retentionDays: 90

# Experience filter: exclude senior roles and jobs requiring too many years
experience:
  enabled: true
  maxYears: 3

# Location filter: only jobs in your country, remote, or with visa sponsorship
location:
  enabled: true
  userCountry: "MX"
  allowRemote: true
  allowVisaSponsorship: true
