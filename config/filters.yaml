# Keywords configuration
# Required: at least one must match (OR between keywords)
# Match All: ALL groups must match (AND between groups, OR within each group)
#   example: [[CAN, UDS], [diagnostic]] → (CAN OR UDS) AND (diagnostic)
# Bonus: informational, increases priority
# Excluded: must not match

required:
  - embedded
  - firmware
  - rtos
  - bare metal
  - microcontroller
  - mcu
  - soc
  - device driver
  - bsp
  - hardware abstraction

match_all:
  - [CAN, UDS, CAN bus, CAN FD]
#   - [diagnostic, ISO 14229]

bonus:
  - arm
  - cortex-m
  - stm32
  - esp32
  - zephyr
  - freertos
  - linux kernel
  - yocto
  - buildroot

excluded:
  - sales
  - marketing
  - manager
  - director
  - vp
  - intern
  - co-op
  - fresh graduate
  - devops
  - react

# Experience filter: exclude senior roles and jobs requiring too many years
experience:
  enabled: true
  maxYears: 3

# Location filter: only jobs in your country, remote, or with visa sponsorship
location:
  enabled: true
  userCountry: "MX"
  allowRemote: false
  allowVisaSponsorship: false
